<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 360px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
  box-sizing: border-box;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 14px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>Create Account</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="create()">Create</button>

  <p><a href="../login/index.html" style="color:#60a5fa;">Back to login</a></p>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA55tbdWKeAUIGBn4fyGqV90WU1UoIKVb0",
  authDomain: "woeblocks.firebaseapp.com",
  projectId: "woeblocks",
  storageBucket: "woeblocks.appspot.com",
  messagingSenderId: "235450732055",
  appId: "1:235450732055:web:ce19a097b14fc27870d652"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function create() {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value;

  const regex = /^[a-zA-Z0-9_]+$/;

  // ---------------- VALIDATION ----------------
  if (user.length < 3 || user.length > 20) {
    alert("Username must be 3-20 characters");
    return;
  }

  if (!regex.test(user)) {
    alert("Only letters, numbers and _ allowed");
    return;
  }

  if ((user.match(/_/g) || []).length > 1) {
    alert("Only 1 underscore allowed");
    return;
  }

  if (pass.length < 8) {
    alert("Password must be at least 8 characters");
    return;
  }

  try {
    // ---------------- CHECK IF EXISTS ----------------
    const doc = await db.collection("users").doc(user).get();

    if (doc.exists) {
      alert("User already exists");
      return;
    }

    // ---------------- CREATE ACCOUNT ----------------
    await db.collection("users").doc(user).set({
      username: user,
      password: pass,
      createdAt: Date.now(),
      robux: 100
    });

    localStorage.setItem("currentUser", user);

    window.location.href = "../homepage/index.html";

  } catch (err) {
    console.log(err);
    alert("Error creating account");
  }
}
</script>

</body>
</html>
