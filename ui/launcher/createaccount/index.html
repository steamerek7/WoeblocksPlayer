<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 360px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
  box-sizing: border-box;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 14px;
  margin: 8px 0;

  border: none;
  border-radius: 8px;

  background: rgba(255,255,255,0.08);
  color: white;

  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;

  border: none;
  border-radius: 8px;

  background: #22c55e;
  color: white;

  cursor: pointer;
  font-weight: bold;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

a {
  color: #60a5fa;
  font-size: 12px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="box">
  <h2>Create Account</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="create()">Create</button>

  <p><a href="../login/index.html">Back to login</a></p>
</div>

<script>
const API_URL = "http://86.92.135.221:3000";

async function create() {
    const user = document.getElementById("user").value.trim();
    const pass = document.getElementById("pass").value;

    // ---------------- VALIDATION ----------------
    const regex = /^[a-zA-Z0-9_]+$/;

    if (user.length < 3 || user.length > 20) {
        alert("Username must be 3-20 characters");
        return;
    }

    if (!regex.test(user)) {
        alert("Only letters, numbers, and _ allowed");
        return;
    }

    if ((user.match(/_/g) || []).length > 1) {
        alert("Only 1 underscore allowed");
        return;
    }

    if (pass.length < 8) {
        alert("Password must be at least 8 characters");
        return;
    }

    const btn = document.querySelector("button");
    btn.disabled = true;
    btn.innerText = "Creating...";

    try {
        const res = await fetch(API_URL + "/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: user,
                password: pass
            })
        });

        const data = await res.json();

        if (data.success) {
            localStorage.setItem("currentUser", user);
            localStorage.setItem("sessionActive", "true");

            window.location.href = "../homepage/index.html";
        } else {
            alert(data.message || "Account creation failed");
        }

    } catch (err) {
        alert("Server not reachable");
        console.log(err);
    }

    btn.disabled = false;
    btn.innerText = "Create";
}
</script>

</body>
</html>
