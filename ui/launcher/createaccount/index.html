<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 360px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
  box-sizing: border-box;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 14px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>Create Account</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="create()">Create</button>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
// 🔥 YOUR FIREBASE CONFIG (PASTE YOUR OWN HERE)
const firebaseConfig = {
  apiKey: "AIzaSyA55tbdWKeAUIGBn4fyGqV90WU1UoIKVb0",
  authDomain: "woeblocks.firebaseapp.com",
  projectId: "https://woeblocks-default-rtdb.europe-west1.firebasedatabase.app",
  storageBucket: "woeblocks.firebasestorage.app",
  messagingSenderId: "235450732055",
  appId: "1:235450732055:web:ce19a097b14fc27870d652"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// VALIDATION RULES
function valid(user, pass) {
  const regex = /^[a-zA-Z0-9_]+$/;

  if (user.length < 3 || user.length > 20) return "Username 3-20 chars";
  if (!regex.test(user)) return "Only letters, numbers, _ allowed";
  if ((user.match(/_/g) || []).length > 1) return "Only 1 underscore allowed";
  if (pass.length < 8) return "Password min 8 chars";

  return null;
}

// CREATE ACCOUNT
async function create() {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value;

  const error = valid(user, pass);
  if (error) {
    alert(error);
    return;
  }

  try {
    const docRef = db.collection("users").doc(user);
    const doc = await docRef.get();

    if (doc.exists) {
      alert("User already exists");
      return;
    }

    await docRef.set({
      username: user,
      password: pass,
      createdAt: Date.now(),
      robux: 100
    });

    localStorage.setItem("currentUser", user);

    window.location.href = "../homepage/index.html";

  } catch (err) {
    console.log(err);
    alert("Error creating account");
  }
}
</script>

</body>
</html>
