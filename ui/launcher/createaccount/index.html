<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 360px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
  box-sizing: border-box;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 14px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>Create Account</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="create()">Create</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "woeblocks.firebaseapp.com",
  databaseURL: "https://woeblocks-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "woeblocks",
  storageBucket: "woeblocks.appspot.com",
  messagingSenderId: "235450732055",
  appId: "1:235450732055:web:ce19a097b14fc27870d652"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.create = async function () {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value;

  const regex = /^[a-zA-Z0-9_]+$/;

  if (user.length < 3 || user.length > 20) return alert("3-20 chars");
  if (!regex.test(user)) return alert("Only letters, numbers, _");
  if ((user.match(/_/g) || []).length > 1) return alert("Only 1 underscore");
  if (pass.length < 8) return alert("Password 8+ chars");

  const userRef = ref(db, "users/" + user);
  const snap = await get(userRef);

  if (snap.exists()) return alert("User exists");

  await set(userRef, {
    username: user,
    password: pass,
    robux: 100,
    createdAt: Date.now()
  });

  localStorage.setItem("currentUser", user);
  window.location.href = "../homepage/index.html";
};
</script>

</body>
</html>
