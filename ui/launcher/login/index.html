<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 360px;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 12px;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Login</h1>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="link">
        No account? <a href="../createaccount/index.html">Create one</a>
    </div>
</div>

<script>
function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    const users = JSON.parse(localStorage.getItem("users") || "{}");

    if (users[user] && users[user] === pass) {
        localStorage.setItem("currentUser", user);
        window.location.href = "../homepage/index.html";
    } else {
        alert("Wrong username or password");
    }
}
</script>

</body>
</html>
