<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 360px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
  box-sizing: border-box;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 14px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p><a href="../createaccount/index.html">Create account</a></p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA55tbdWKeAUIGBn4fyGqV90WU1UoIKVb0",
  authDomain: "woeblocks.firebaseapp.com",
  projectId: "woeblocks",
  storageBucket: "woeblocks.firebasestorage.app",
  messagingSenderId: "235450732055",
  appId: "1:235450732055:web:ce19a097b14fc27870d652"
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOGIN FUNCTION
async function login() {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value;

  if (!user || !pass) {
    alert("Fill in all fields");
    return;
  }

  try {
    const docRef = db.collection("users").doc(user);
    const doc = await docRef.get();

    if (!doc.exists) {
      alert("User not found");
      return;
    }

    const data = doc.data();

    if (data.password !== pass) {
      alert("Wrong password");
      return;
    }

    // SAVE SESSION
    localStorage.setItem("currentUser", user);
    localStorage.setItem("sessionActive", "true");

    window.location.href = "../homepage/index.html";

  } catch (err) {
    console.log(err);
    alert("Login error");
  }
}
</script>

</body>
</html>
