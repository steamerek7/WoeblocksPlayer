<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 360px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
  box-sizing: border-box;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 14px;
  margin: 8px 0;

  border: none;
  border-radius: 8px;

  background: rgba(255,255,255,0.08);
  color: white;

  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;

  border: none;
  border-radius: 8px;

  background: #3b82f6;
  color: white;

  cursor: pointer;
  font-weight: bold;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

a {
  color: #60a5fa;
  font-size: 12px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p><a href="../createaccount/index.html">Create account</a></p>
</div>

<script>
const API_URL = "http://86.92.135.221:3000";

async function login() {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value;

  if (!user || !pass) {
    alert("Fill in all fields");
    return;
  }

  const btn = document.querySelector("button");
  btn.disabled = true;
  btn.innerText = "Logging in...";

  try {
    const res = await fetch(API_URL + "/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username: user,
        password: pass
      })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("currentUser", user);
      localStorage.setItem("sessionActive", "true");

      window.location.href = "../homepage/index.html";
    } else {
      alert(data.message || "Wrong username or password");
    }

  } catch (err) {
    alert("Server not reachable");
    console.log(err);
  }

  btn.disabled = false;
  btn.innerText = "Login";
}
</script>

</body>
</html>
