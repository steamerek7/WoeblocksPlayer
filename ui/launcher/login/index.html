<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 360px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
  box-sizing: border-box;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 14px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "woeblocks.firebaseapp.com",
  databaseURL: "https://woeblocks-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "woeblocks",
  storageBucket: "woeblocks.appspot.com",
  messagingSenderId: "235450732055",
  appId: "1:235450732055:web:ce19a097b14fc27870d652"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.login = async function () {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value;

  const userRef = ref(db, "users/" + user);
  const snap = await get(userRef);

  if (!snap.exists()) return alert("User not found");

  const data = snap.val();

  if (data.password !== pass) return alert("Wrong password");

  localStorage.setItem("currentUser", user);
  window.location.href = "../homepage/index.html";
};
</script>

</body>
</html>
