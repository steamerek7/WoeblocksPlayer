<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woeblocks Engine</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    overflow:hidden;
    background:#87ceeb;
}

.topbar{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#1b1d22;
    border-bottom:1px solid #2f333c;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    z-index:10;
    color:white;
}

.healthContainer{
    position:absolute;
    top:80px;
    right:20px;
    width:250px;
    height:22px;
    background:#2b2b2b;
    border-radius:999px;
    overflow:hidden;
    border:2px solid #444;
    z-index:10;
}

.healthBar{
    width:100%;
    height:100%;
    background:linear-gradient(to right,#00ff88,#00cc66);
}

canvas{ display:block; }

</style>
</head>

<body>

<div class="topbar">
    <div>Woeblocks</div>
    <div>WASD Move | Space Jump | Mouse Camera</div>
</div>

<div class="healthContainer">
    <div class="healthBar" id="hp"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* ===================== SCENE ===================== */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

/* ===================== CAMERA ===================== */

const camera = new THREE.PerspectiveCamera(
75, window.innerWidth/window.innerHeight, 0.1, 1000
);

camera.position.set(0,8,12);

/* ===================== RENDERER ===================== */

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ===================== LIGHT ===================== */

scene.add(new THREE.AmbientLight(0xffffff,0.6));

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(20,30,20);
scene.add(sun);

/* ===================== WORLD ===================== */

function box(w,h,d,color,x,y,z,anchored=true){
    const m = new THREE.Mesh(
        new THREE.BoxGeometry(w,h,d),
        new THREE.MeshStandardMaterial({color})
    );
    m.position.set(x,y,z);
    m.userData = {w,h,d,anchored};
    scene.add(m);
    return m;
}

const baseplate = box(120,1,120,0x4caf50,0,-0.5,0,true);
const spawn = box(6,1,6,0x3b82f6,0,0,0,true);
const pushBox = box(4,4,4,0x888888,8,2,0,false);

/* ===================== PLAYER ===================== */

const player = new THREE.Group();
scene.add(player);

const body = new THREE.Mesh(
new THREE.BoxGeometry(2,3,1),
new THREE.MeshStandardMaterial({color:0x2563eb})
);
body.position.y = 4;
player.add(body);

player.position.set(0,2,0);

/* ===================== INPUT ===================== */

const keys = {};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* ===================== PHYSICS ===================== */

let velY = 0;
const gravity = -0.02;
let grounded = false;

/* ===================== CAMERA ===================== */

let camRot = 0;
window.addEventListener("mousemove",e=>{
camRot -= e.movementX * 0.002;
});

/* ===================== COLLISION ===================== */

function collide(a,b){

return (
Math.abs(a.position.x-b.position.x) < (aSize(a)+b.userData.w)/2 &&
Math.abs(a.position.z-b.position.z) < (aSize(a)+b.userData.d)/2 &&
Math.abs(a.position.y-b.position.y) < (aSizeY(a)+b.userData.h)/2
);

}

function aSize(a){ return 2; }
function aSizeY(a){ return 3; }

/* ===================== UPDATE ===================== */

function animate(){

requestAnimationFrame(animate);

/* MOVE INPUT */

let mx=0,mz=0;

if(keys["w"]) mz--;
if(keys["s"]) mz++;
if(keys["a"]) mx--;
if(keys["d"]) mx++;

/* CAMERA RELATIVE */

const sin=Math.sin(camRot);
const cos=Math.cos(camRot);

const fx = mx*cos - mz*sin;
const fz = mz*cos + mx*sin;

/* MOVE HORIZONTAL */

player.position.x += fx * 0.15;
player.position.z += fz * 0.15;

/* SMOOTH TURN */

if(mx||mz){
player.rotation.y += (Math.atan2(fx,fz)-player.rotation.y)*0.2;
}

/* JUMP */

if(keys[" "] && grounded){
velY = 0.35;
grounded = false;
}

/* GRAVITY */

velY += gravity;
player.position.y += velY;

/* FLOOR DETECTION (NO TELEPORT JITTER) */

grounded = false;

const objects=[baseplate,spawn,pushBox];

for(let o of objects){

const top = o.position.y + o.userData.h/2;

const onTop =
player.position.x > o.position.x - o.userData.w/2 &&
player.position.x < o.position.x + o.userData.w/2 &&
player.position.z > o.position.z - o.userData.d/2 &&
player.position.z < o.position.z + o.userData.d/2;

if(onTop && player.position.y <= top + 0.1 && velY <= 0){

player.position.y = top;
velY = 0;
grounded = true;

}

/* PUSH BOX */

if(!o.userData.anchored && onTop){
o.position.x += fx * 0.1;
o.position.z += fz * 0.1;
}

}

/* FALL RESET */

if(player.position.y < -30){
player.position.set(0,5,0);
velY=0;
}

/* CAMERA FOLLOW */

camera.position.x = player.position.x + Math.sin(camRot)*12;
camera.position.z = player.position.z + Math.cos(camRot)*12;
camera.position.y = player.position.y + 8;

camera.lookAt(player.position.x, player.position.y+3, player.position.z);

/* RENDER */

renderer.render(scene,camera);

}

animate();

/* ===================== RESIZE ===================== */

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
