<!-- ========================= -->
<!-- GAMEPAGE.HTML             -->
<!-- ========================= -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woeblocks</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    overflow:hidden;
    background:#111317;
}

/* TOPBAR */

.topbar{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:60px;

    background:#1b1d22;
    border-bottom:1px solid #2d3138;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    z-index:100;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

.right{
    color:#bdbdbd;
    font-size:14px;
}

/* HEALTH */

.healthContainer{
    position:absolute;
    top:80px;
    right:20px;

    width:260px;
    height:26px;

    background:#2b2b2b;

    border-radius:999px;

    overflow:hidden;

    border:2px solid #3d4148;

    z-index:100;
}

.healthBar{
    width:100%;
    height:100%;

    background:
    linear-gradient(
        to right,
        #00ff88,
        #00c96b
    );

    border-radius:999px;

    transition:0.2s;
}

/* INFO */

.info{
    position:absolute;
    bottom:20px;
    left:20px;

    width:320px;

    background:rgba(20,20,20,0.85);

    border:1px solid #333842;

    border-radius:16px;

    padding:18px;

    z-index:100;

    color:white;
}

.info h2{
    margin-bottom:12px;
}

.info p{
    color:#c6c6c6;
    line-height:1.6;
}

canvas{
    display:block;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="logo">
        Woeblocks
    </div>

    <div class="right">
        WASD = Move | Mouse = Camera
    </div>

</div>

<!-- HEALTH -->

<div class="healthContainer">

    <div class="healthBar" id="healthBar"></div>

</div>

<!-- INFO -->

<div class="info">

    <h2 id="gameTitle"></h2>

    <p id="gameDescription"></p>

</div>

<!-- THREEJS -->

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<!-- CHARACTER -->

<script src="Character.js"></script>

<script>

/* ========================= */
/* LOAD GAME INFO            */
/* ========================= */

const game =
JSON.parse(
    localStorage.getItem("selectedGame")
);

document.getElementById("gameTitle")
.innerText = game.title;

document.getElementById("gameDescription")
.innerText = game.description;

/* ========================= */
/* SCENE                     */
/* ========================= */

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x87ceeb);

/* ========================= */
/* CAMERA                    */
/* ========================= */

const camera =
new THREE.PerspectiveCamera(

    75,

    window.innerWidth /
    window.innerHeight,

    0.1,

    1000

);

camera.position.set(0,8,12);

/* ========================= */
/* RENDERER                  */
/* ========================= */

const renderer =
new THREE.WebGLRenderer({

    antialias:true

});

renderer.setSize(

    window.innerWidth,
    window.innerHeight

);

renderer.shadowMap.enabled = true;

renderer.shadowMap.type =
THREE.PCFSoftShadowMap;

document.body.appendChild(
    renderer.domElement
);

/* ========================= */
/* LIGHTING                  */
/* ========================= */

const ambient =
new THREE.AmbientLight(
    0xffffff,
    0.6
);

scene.add(ambient);

const sun =
new THREE.DirectionalLight(
    0xffffff,
    1
);

sun.position.set(20,30,20);

sun.castShadow = true;

scene.add(sun);

/* ========================= */
/* TEXTURES                  */
/* ========================= */

const loader =
new THREE.TextureLoader();

const studTexture =
loader.load(
"https://i.imgur.com/8yKQF8x.png"
);

studTexture.wrapS =
THREE.RepeatWrapping;

studTexture.wrapT =
THREE.RepeatWrapping;

studTexture.repeat.set(8,8);

/* ========================= */
/* BASEPLATE                 */
/* ========================= */

const baseplate =
new THREE.Mesh(

    new THREE.BoxGeometry(
        120,
        1,
        120
    ),

    new THREE.MeshStandardMaterial({
        map:studTexture
    })

);

baseplate.position.y = -0.5;

baseplate.receiveShadow = true;

baseplate.userData = {
    anchored:true
};

scene.add(baseplate);

/* ========================= */
/* SPAWNLOCATION             */
/* ========================= */

const spawn =
new THREE.Mesh(

    new THREE.BoxGeometry(
        6,
        1,
        6
    ),

    new THREE.MeshStandardMaterial({

        color:0x3b82f6,

        emissive:0x2563eb,

        emissiveIntensity:0.4

    })

);

spawn.position.set(0,0.1,0);

spawn.receiveShadow = true;

spawn.userData = {
    anchored:true
};

scene.add(spawn);

/* ========================= */
/* TEST PUSHABLE PART        */
/* ========================= */

const pushBox =
new THREE.Mesh(

    new THREE.BoxGeometry(
        4,
        4,
        4
    ),

    new THREE.MeshStandardMaterial({
        map:studTexture
    })

);

pushBox.position.set(10,2,0);

pushBox.castShadow = true;

pushBox.userData = {

    anchored:false,

    velocity:
    new THREE.Vector3()

};

scene.add(pushBox);

/* ========================= */
/* PLAYER                    */
/* ========================= */

const player =
createCharacter();

scene.add(player);

/* ========================= */
/* HEALTH                    */
/* ========================= */

let health = 100;

const healthBar =
document.getElementById(
    "healthBar"
);

/* ========================= */
/* INPUT                     */
/* ========================= */

const keys = {};

window.addEventListener(
    "keydown",
    (e)=>{

    keys[e.key.toLowerCase()] =
    true;

});

window.addEventListener(
    "keyup",
    (e)=>{

    keys[e.key.toLowerCase()] =
    false;

});

/* ========================= */
/* CAMERA ROTATION           */
/* ========================= */

let camRotation = 0;

window.addEventListener(
    "mousemove",
    (e)=>{

    camRotation -=
    e.movementX * 0.002;

});

/* ========================= */
/* VALUES                    */
/* ========================= */

const velocity =
new THREE.Vector3();

const gravity = -0.015;

/* ========================= */
/* COLLISION                 */
/* ========================= */

function collision(a,b){

    const box1 =
    new THREE.Box3()
    .setFromObject(a);

    const box2 =
    new THREE.Box3()
    .setFromObject(b);

    return box1.intersectsBox(box2);

}

/* ========================= */
/* ANIMATE                   */
/* ========================= */

function animate(){

requestAnimationFrame(animate);

/* MOVEMENT */

const speed = 0.12;

let moveX = 0;
let moveZ = 0;

if(keys["w"]) moveZ -= 1;
if(keys["s"]) moveZ += 1;
if(keys["a"]) moveX -= 1;
if(keys["d"]) moveX += 1;

/* CAMERA RELATIVE */

const sin =
Math.sin(camRotation);

const cos =
Math.cos(camRotation);

const finalX =
moveX * cos -
moveZ * sin;

const finalZ =
moveZ * cos +
moveX * sin;

/* MOVE */

player.position.x +=
finalX * speed;

player.position.z +=
finalZ * speed;

/* SMOOTH TURN */

if(moveX !== 0 ||
moveZ !== 0){

    const targetRotation =

    Math.atan2(
        finalX,
        finalZ
    );

    player.rotation.y +=

    (targetRotation -
    player.rotation.y)

    * 0.15;

}

/* WALK */

animateCharacter(
    player,
    moveX !== 0 ||
    moveZ !== 0
);

/* GRAVITY */

velocity.y += gravity;

player.position.y +=
velocity.y;

/* OBJECTS */

const objects = [
    baseplate,
    spawn,
    pushBox
];

let grounded = false;

objects.forEach(obj=>{

    if(collision(player,obj)){

        /* STAND */

        if(player.position.y >
        obj.position.y){

            player.position.y =
            obj.position.y + 1;

            velocity.y = 0;

            grounded = true;

        }

        /* PUSHABLE */

        if(!obj.userData.anchored){

            obj.position.x +=
            finalX * 0.15;

            obj.position.z +=
            finalZ * 0.15;

        }

        /* WALL COLLISION */

        else{

            player.position.x -=
            finalX * speed;

            player.position.z -=
            finalZ * speed;

        }

    }

});

/* FALL */

if(!grounded){

    velocity.y += gravity;

}

/* DEATH */

if(player.position.y < -25){

    health = 0;

    healthBar.style.width =
    health + "%";

    alert("You died");

    location.reload();

}

/* CAMERA */

camera.position.x =

player.position.x +

Math.sin(camRotation)
* 12;

camera.position.z =

player.position.z +

Math.cos(camRotation)
* 12;

camera.position.y =

player.position.y + 8;

camera.lookAt(

    player.position.x,

    player.position.y + 4,

    player.position.z

);

/* RENDER */

renderer.render(
    scene,
    camera
);

}

animate();

/* ========================= */
/* RESIZE                    */
/* ========================= */

window.addEventListener(
"resize",

()=>{

camera.aspect =

window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(

window.innerWidth,
window.innerHeight

);

});

</script>

</body>
</html>
