<!-- GAMEPAGE.HTML -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woeblocks Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#121417;
    color:white;
    overflow:hidden;
}

/* TOPBAR */

.topbar{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:60px;

    background:#1b1d22;
    border-bottom:1px solid #2b2f36;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    z-index:10;
}

.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.back{
    background:#2b2f36;
    border:none;
    color:white;

    padding:10px 18px;

    border-radius:10px;

    cursor:pointer;
}

.back:hover{
    background:#3a3f47;
}

.gameTitle{
    font-size:22px;
    font-weight:bold;
}

/* PLAY UI */

.ui{
    position:absolute;
    bottom:20px;
    left:20px;

    background:rgba(20,20,20,0.8);

    border:1px solid #333;

    padding:18px;

    border-radius:14px;

    z-index:10;

    width:320px;
}

.ui h2{
    margin-bottom:10px;
}

.ui p{
    color:#b8b8b8;
    line-height:1.5;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="left">

        <button class="back" onclick="back()">
            Back
        </button>

        <div class="gameTitle" id="title"></div>

    </div>

</div>

<!-- INFO -->

<div class="ui">

    <h2>Game Data</h2>

    <p>
        Loaded Parts:
        <br><br>

        • Baseplate
        <br>

        • SpawnLocation
        <br>

        • Custom 3D Character
    </p>

</div>

<!-- THREE.JS -->

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* GAME */

const game = JSON.parse(localStorage.getItem("selectedGame"));

if(!game){

    window.location.href = "index.html";

}

document.getElementById("title").innerText = game.title;

/* SCENE */

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87ceeb);

/* CAMERA */

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(0, 8, 15);

/* RENDERER */

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(renderer.domElement);

/* LIGHT */

const light = new THREE.DirectionalLight(0xffffff, 1);

light.position.set(10,20,10);

scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));

/* BASEPLATE */

const baseplateGeometry = new THREE.BoxGeometry(
    60,
    1,
    60
);

const baseplateMaterial = new THREE.MeshStandardMaterial({
    color:0x4a7a42
});

const baseplate = new THREE.Mesh(
    baseplateGeometry,
    baseplateMaterial
);

baseplate.position.y = -0.5;

scene.add(baseplate);

/* SPAWN LOCATION */

const spawnGeometry = new THREE.BoxGeometry(
    6,
    1,
    6
);

const spawnMaterial = new THREE.MeshStandardMaterial({
    color:0x3b82f6
});

const spawn = new THREE.Mesh(
    spawnGeometry,
    spawnMaterial
);

spawn.position.set(0,0.1,0);

scene.add(spawn);

/* CUSTOM CHARACTER */

/* BODY */

const body = new THREE.Mesh(

    new THREE.BoxGeometry(2,3,1),

    new THREE.MeshStandardMaterial({
        color:0x2563eb
    })

);

body.position.y = 3;

scene.add(body);

/* HEAD */

const head = new THREE.Mesh(

    new THREE.BoxGeometry(1.8,1.8,1.8),

    new THREE.MeshStandardMaterial({
        color:0xffd6b3
    })

);

head.position.y = 5.5;

scene.add(head);

/* LEFT ARM */

const leftArm = new THREE.Mesh(

    new THREE.BoxGeometry(0.7,2.5,0.7),

    new THREE.MeshStandardMaterial({
        color:0xffd6b3
    })

);

leftArm.position.set(-1.5,3,0);

scene.add(leftArm);

/* RIGHT ARM */

const rightArm = new THREE.Mesh(

    new THREE.BoxGeometry(0.7,2.5,0.7),

    new THREE.MeshStandardMaterial({
        color:0xffd6b3
    })

);

rightArm.position.set(1.5,3,0);

scene.add(rightArm);

/* LEFT LEG */

const leftLeg = new THREE.Mesh(

    new THREE.BoxGeometry(0.8,2.5,0.8),

    new THREE.MeshStandardMaterial({
        color:0x1f2937
    })

);

leftLeg.position.set(-0.5,0.8,0);

scene.add(leftLeg);

/* RIGHT LEG */

const rightLeg = new THREE.Mesh(

    new THREE.BoxGeometry(0.8,2.5,0.8),

    new THREE.MeshStandardMaterial({
        color:0x1f2937
    })

);

rightLeg.position.set(0.5,0.8,0);

scene.add(rightLeg);

/* ANIMATION */

function animate(){

    requestAnimationFrame(animate);

    body.rotation.y += 0.003;

    head.rotation.y += 0.003;

    leftArm.rotation.y += 0.003;

    rightArm.rotation.y += 0.003;

    leftLeg.rotation.y += 0.003;

    rightLeg.rotation.y += 0.003;

    renderer.render(scene,camera);

}

animate();

/* RESIZE */

window.addEventListener("resize", () => {

    camera.aspect =
        window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

/* BACK */

function back(){

    window.location.href = "index.html";

}

</script>

</body>
</html>
