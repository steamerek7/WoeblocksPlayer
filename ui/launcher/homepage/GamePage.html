<!-- ===================================== -->
<!-- FULL GAMEPAGE.HTML (FIXED ENGINE)     -->
<!-- ===================================== -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woeblocks</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    overflow:hidden;
    background:#111317;
}

/* TOPBAR */

.topbar{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:60px;

    background:#1b1d22;
    border-bottom:1px solid #2e3239;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    z-index:100;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

.infoText{
    color:#bdbdbd;
    font-size:14px;
}

/* HEALTH */

.healthContainer{

    position:absolute;

    top:80px;
    right:20px;

    width:260px;
    height:24px;

    background:#2a2a2a;

    border-radius:999px;

    overflow:hidden;

    border:2px solid #3d4148;

    z-index:100;

}

.healthBar{

    width:100%;
    height:100%;

    border-radius:999px;

    background:
    linear-gradient(
        to right,
        #00ff88,
        #00c96b
    );

    transition:0.2s;

}

/* GAME INFO */

.panel{

    position:absolute;

    left:20px;
    bottom:20px;

    width:320px;

    background:rgba(20,20,20,0.85);

    border:1px solid #343842;

    border-radius:16px;

    padding:18px;

    z-index:100;

    color:white;

}

.panel h2{
    margin-bottom:12px;
}

.panel p{
    color:#c6c6c6;
    line-height:1.6;
}

canvas{
    display:block;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="logo">
        Woeblocks
    </div>

    <div class="infoText">
        WASD = Move | Mouse = Camera
    </div>

</div>

<!-- HEALTH -->

<div class="healthContainer">

    <div class="healthBar" id="healthBar"></div>

</div>

<!-- PANEL -->

<div class="panel">

    <h2 id="gameTitle"></h2>

    <p id="gameDescription"></p>

</div>

<!-- THREEJS -->

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<!-- CHARACTER -->

<script>

/* ===================================== */
/* CHARACTER SYSTEM                      */
/* ===================================== */

function createCharacter(){

    const player = new THREE.Group();

    /* BODY */

    const torso = new THREE.Mesh(

        new THREE.BoxGeometry(2,3,1),

        new THREE.MeshStandardMaterial({
            color:0x2563eb
        })

    );

    torso.position.y = 4;

    torso.castShadow = true;

    player.add(torso);

    /* HEAD */

    const head = new THREE.Mesh(

        new THREE.BoxGeometry(
            1.8,
            1.8,
            1.8
        ),

        new THREE.MeshStandardMaterial({
            color:0xffd6b3
        })

    );

    head.position.y = 6.2;

    head.castShadow = true;

    player.add(head);

    /* LEFT ARM */

    const leftArm = new THREE.Mesh(

        new THREE.BoxGeometry(
            0.7,
            2.5,
            0.7
        ),

        new THREE.MeshStandardMaterial({
            color:0xffd6b3
        })

    );

    leftArm.position.set(
        -1.5,
        4,
        0
    );

    leftArm.castShadow = true;

    player.add(leftArm);

    /* RIGHT ARM */

    const rightArm = leftArm.clone();

    rightArm.position.x = 1.5;

    player.add(rightArm);

    /* LEFT LEG */

    const leftLeg = new THREE.Mesh(

        new THREE.BoxGeometry(
            0.8,
            2.5,
            0.8
        ),

        new THREE.MeshStandardMaterial({
            color:0x1f2937
        })

    );

    leftLeg.position.set(
        -0.5,
        1.8,
        0
    );

    leftLeg.castShadow = true;

    player.add(leftLeg);

    /* RIGHT LEG */

    const rightLeg = leftLeg.clone();

    rightLeg.position.x = 0.5;

    player.add(rightLeg);

    /* SAVE LIMBS */

    player.userData = {

        leftArm,
        rightArm,
        leftLeg,
        rightLeg,

        width:2,
        height:7

    };

    return player;

}

/* WALK ANIMATION */

function animateCharacter(
    player,
    moving
){

    const {
        leftArm,
        rightArm,
        leftLeg,
        rightLeg
    }

    = player.userData;

    if(moving){

        const walk =
        Math.sin(
            Date.now() * 0.01
        ) * 0.7;

        leftArm.rotation.x = walk;
        rightArm.rotation.x = -walk;

        leftLeg.rotation.x = -walk;
        rightLeg.rotation.x = walk;

    }

    else{

        leftArm.rotation.x = 0;
        rightArm.rotation.x = 0;

        leftLeg.rotation.x = 0;
        rightLeg.rotation.x = 0;

    }

}

</script>

<script>

/* ===================================== */
/* GAME INFO                             */
/* ===================================== */

const game =
JSON.parse(
localStorage.getItem(
"selectedGame"
));

document.getElementById(
"gameTitle"
).innerText = game.title;

document.getElementById(
"gameDescription"
).innerText =
game.description;

/* ===================================== */
/* SCENE                                 */
/* ===================================== */

const scene =
new THREE.Scene();

scene.background =
new THREE.Color(0x87ceeb);

/* ===================================== */
/* CAMERA                                */
/* ===================================== */

const camera =
new THREE.PerspectiveCamera(

75,

window.innerWidth /
window.innerHeight,

0.1,

1000

);

camera.position.set(0,8,12);

/* ===================================== */
/* RENDERER                              */
/* ===================================== */

const renderer =
new THREE.WebGLRenderer({

    antialias:true

});

renderer.setSize(

window.innerWidth,
window.innerHeight

);

renderer.shadowMap.enabled =
true;

renderer.shadowMap.type =
THREE.PCFSoftShadowMap;

document.body.appendChild(
renderer.domElement
);

/* ===================================== */
/* LIGHTING                              */
/* ===================================== */

const ambient =
new THREE.AmbientLight(
0xffffff,
0.6
);

scene.add(ambient);

const sun =
new THREE.DirectionalLight(
0xffffff,
1
);

sun.position.set(20,30,20);

sun.castShadow = true;

scene.add(sun);

/* ===================================== */
/* TEXTURES                              */
/* ===================================== */

const loader =
new THREE.TextureLoader();

const studTexture =
loader.load(
"https://i.imgur.com/8yKQF8x.png"
);

studTexture.wrapS =
THREE.RepeatWrapping;

studTexture.wrapT =
THREE.RepeatWrapping;

studTexture.repeat.set(8,8);

/* ===================================== */
/* BASEPLATE                             */
/* ===================================== */

const baseplate =
new THREE.Mesh(

new THREE.BoxGeometry(
120,
1,
120
),

new THREE.MeshStandardMaterial({
map:studTexture
})

);

baseplate.position.y = -0.5;

baseplate.receiveShadow =
true;

baseplate.userData = {

anchored:true,

size:{
x:120,
y:1,
z:120
}

};

scene.add(baseplate);

/* ===================================== */
/* SPAWNLOCATION                         */
/* ===================================== */

const spawn =
new THREE.Mesh(

new THREE.BoxGeometry(
6,
1,
6
),

new THREE.MeshStandardMaterial({

color:0x3b82f6,

emissive:0x2563eb,

emissiveIntensity:0.4

})

);

spawn.position.set(0,0.5,0);

spawn.receiveShadow = true;

spawn.userData = {

anchored:true,

size:{
x:6,
y:1,
z:6
}

};

scene.add(spawn);

/* ===================================== */
/* PUSHABLE PART                         */
/* ===================================== */

const pushBox =
new THREE.Mesh(

new THREE.BoxGeometry(
4,
4,
4
),

new THREE.MeshStandardMaterial({
map:studTexture
})

);

pushBox.position.set(
10,
2,
0
);

pushBox.castShadow = true;

pushBox.userData = {

anchored:false,

size:{
x:4,
y:4,
z:4
}

};

scene.add(pushBox);

/* ===================================== */
/* PLAYER                                */
/* ===================================== */

const player =
createCharacter();

scene.add(player);

/* SPAWN PLAYER */

function respawn(){

player.position.set(
0,
1,
0
);

velocity.y = 0;

health = 100;

healthBar.style.width =
"100%";

}

respawn();

/* ===================================== */
/* HEALTH                                */
/* ===================================== */

let health = 100;

const healthBar =
document.getElementById(
"healthBar"
);

/* ===================================== */
/* INPUT                                 */
/* ===================================== */

const keys = {};

window.addEventListener(
"keydown",
(e)=>{

keys[
e.key.toLowerCase()
] = true;

});

window.addEventListener(
"keyup",
(e)=>{

keys[
e.key.toLowerCase()
] = false;

});

/* ===================================== */
/* CAMERA ROTATION                       */
/* ===================================== */

let camRotation = 0;

window.addEventListener(
"mousemove",
(e)=>{

camRotation -=
e.movementX * 0.002;

});

/* ===================================== */
/* PHYSICS                               */
/* ===================================== */

const velocity =
new THREE.Vector3();

const gravity = -0.015;

/* ===================================== */
/* COLLISION                             */
/* ===================================== */

function checkCollision(
player,
obj
){

const pWidth =
player.userData.width;

const pHeight =
player.userData.height;

const oSize =
obj.userData.size;

return (

Math.abs(
player.position.x -
obj.position.x
)

<

(pWidth/2) +
(oSize.x/2)

&&

Math.abs(
player.position.z -
obj.position.z
)

<

(pWidth/2) +
(oSize.z/2)

&&

player.position.y <=
obj.position.y +
(oSize.y/2) + 1

);

}

/* ===================================== */
/* ANIMATE                               */
/* ===================================== */

function animate(){

requestAnimationFrame(
animate
);

/* MOVE */

const speed = 0.12;

let moveX = 0;
let moveZ = 0;

if(keys["w"]) moveZ -= 1;
if(keys["s"]) moveZ += 1;
if(keys["a"]) moveX -= 1;
if(keys["d"]) moveX += 1;

/* CAMERA RELATIVE */

const sin =
Math.sin(camRotation);

const cos =
Math.cos(camRotation);

const finalX =

moveX * cos -
moveZ * sin;

const finalZ =

moveZ * cos +
moveX * sin;

/* SAVE OLD POS */

const oldX =
player.position.x;

const oldZ =
player.position.z;

/* MOVE PLAYER */

player.position.x +=
finalX * speed;

player.position.z +=
finalZ * speed;

/* SMOOTH TURN */

if(moveX !== 0 ||
moveZ !== 0){

const targetRotation =

Math.atan2(
finalX,
finalZ
);

player.rotation.y +=

(targetRotation -
player.rotation.y)

* 0.15;

}

/* WALK */

animateCharacter(

player,

moveX !== 0 ||
moveZ !== 0

);

/* GRAVITY */

velocity.y += gravity;

player.position.y +=
velocity.y;

/* OBJECTS */

const objects = [

baseplate,
spawn,
pushBox

];

let grounded = false;

objects.forEach(obj=>{

if(checkCollision(
player,
obj
)){

const top =

obj.position.y +

(obj.userData.size.y/2);

/* STAND */

if(

player.position.y <=
top + 1

){

player.position.y =
top + 1;

velocity.y = 0;

grounded = true;

}

/* PUSHABLE */

if(
!obj.userData.anchored
){

obj.position.x +=
finalX * 0.12;

obj.position.z +=
finalZ * 0.12;

}

/* WALL */

else{

if(obj !== baseplate
&& obj !== spawn){

player.position.x =
oldX;

player.position.z =
oldZ;

}

}

}

});

/* FALL */

if(player.position.y < -20){

health = 0;

healthBar.style.width =
"0%";

/* RESPAWN */

setTimeout(()=>{

respawn();

},500);

}

/* HEALTH */

healthBar.style.width =
health + "%";

/* CAMERA */

camera.position.x =

player.position.x +

Math.sin(
camRotation
) * 12;

camera.position.z =

player.position.z +

Math.cos(
camRotation
) * 12;

camera.position.y =

player.position.y + 8;

camera.lookAt(

player.position.x,

player.position.y + 4,

player.position.z

);

/* RENDER */

renderer.render(
scene,
camera
);

}

animate();

/* ===================================== */
/* RESIZE                                */
/* ===================================== */

window.addEventListener(
"resize",

()=>{

camera.aspect =

window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(

window.innerWidth,
window.innerHeight

);

});

</script>

</body>
</html>
