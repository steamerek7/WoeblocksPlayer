# Woeblocks 3D Game Engine

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woeblocks Engine</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    overflow:hidden;
    background:#111317;
}

canvas{
    display:block;
}

/* TOPBAR */

.topbar{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:60px;

    background:#1b1d22;
    border-bottom:1px solid #2f333c;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    z-index:100;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

.info{
    color:#aaa;
    font-size:14px;
}

/* GAME INFO */

.panel{
    position:absolute;
    left:20px;
    bottom:20px;

    width:300px;

    background:rgba(20,20,20,0.85);
    border:1px solid #333842;

    padding:18px;

    border-radius:14px;

    z-index:100;

    color:white;
}

.panel h2{
    margin-bottom:12px;
}

.panel p{
    color:#c5c5c5;
    line-height:1.6;
}

</style>
</head>

<body>

<div class="topbar">

    <div class="logo">
        Woeblocks Engine
    </div>

    <div class="info">
        WASD = Move | Mouse = Camera
    </div>

</div>

<div class="panel">

    <h2>Loaded Objects</h2>

    <p>
        • Baseplate
        <br>
        • SpawnLocation
        <br>
        • Playable Character
        <br>
        • Camera System
        <br>
        • Movement System
    </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* SCENE */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

/* CAMERA */

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(0,6,12);

/* RENDERER */

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;

renderer.domElement.style.position = "absolute";
renderer.domElement.style.top = "0";
renderer.domElement.style.left = "0";

document.body.appendChild(renderer.domElement);

/* LIGHTING */

const ambient = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff,1);

sun.position.set(10,20,10);

sun.castShadow = true;

scene.add(sun);

/* BASEPLATE */

const baseplate = new THREE.Mesh(

    new THREE.BoxGeometry(120,1,120),

    new THREE.MeshStandardMaterial({
        color:0x4b7f3f
    })

);

baseplate.position.y = -0.5;

baseplate.receiveShadow = true;

scene.add(baseplate);

/* GRID */

const grid = new THREE.GridHelper(120,120,0x000000,0x000000);

grid.material.opacity = 0.2;
grid.material.transparent = true;

scene.add(grid);

/* SPAWN */

const spawn = new THREE.Mesh(

    new THREE.BoxGeometry(6,1,6),

    new THREE.MeshStandardMaterial({
        color:0x2d7fff,
        emissive:0x1d4ed8,
        emissiveIntensity:0.4
    })

);

spawn.position.set(0,0.1,0);

spawn.receiveShadow = true;

scene.add(spawn);

/* CHARACTER */

const character = new THREE.Group();

/* BODY */

const torso = new THREE.Mesh(

    new THREE.BoxGeometry(2,3,1),

    new THREE.MeshStandardMaterial({
        color:0x2563eb
    })

);

torso.position.y = 4;

torso.castShadow = true;

character.add(torso);

/* HEAD */

const head = new THREE.Mesh(

    new THREE.BoxGeometry(1.7,1.7,1.7),

    new THREE.MeshStandardMaterial({
        color:0xffd7b5
    })

);

head.position.y = 6.4;

head.castShadow = true;

character.add(head);

/* LEFT ARM */

const leftArm = new THREE.Mesh(

    new THREE.BoxGeometry(0.7,2.4,0.7),

    new THREE.MeshStandardMaterial({
        color:0xffd7b5
    })

);

leftArm.position.set(-1.5,4,0);
leftArm.castShadow = true;

character.add(leftArm);

/* RIGHT ARM */

const rightArm = new THREE.Mesh(

    new THREE.BoxGeometry(0.7,2.4,0.7),

    new THREE.MeshStandardMaterial({
        color:0xffd7b5
    })

);

rightArm.position.set(1.5,4,0);
rightArm.castShadow = true;

character.add(rightArm);

/* LEFT LEG */

const leftLeg = new THREE.Mesh(

    new THREE.BoxGeometry(0.8,2.5,0.8),

    new THREE.MeshStandardMaterial({
        color:0x1f2937
    })

);

leftLeg.position.set(-0.5,1.8,0);
leftLeg.castShadow = true;

character.add(leftLeg);

/* RIGHT LEG */

const rightLeg = new THREE.Mesh(

    new THREE.BoxGeometry(0.8,2.5,0.8),

    new THREE.MeshStandardMaterial({
        color:0x1f2937
    })

);

rightLeg.position.set(0.5,1.8,0);
rightLeg.castShadow = true;

character.add(rightLeg);

scene.add(character);

/* MOVEMENT */

const keys = {};

window.addEventListener("keydown", (e)=>{
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", (e)=>{
    keys[e.key.toLowerCase()] = false;
});

/* CAMERA FOLLOW */

function updateCamera(){

    camera.position.x = character.position.x;
    camera.position.z = character.position.z + 12;

    camera.lookAt(
        character.position.x,
        4,
        character.position.z
    );

}

/* ANIMATE */

function animate(){

    requestAnimationFrame(animate);

    const speed = 0.15;

    let moving = false;

    if(keys["w"]){
        character.position.z -= speed;
        character.rotation.y = 0;
        moving = true;
    }

    if(keys["s"]){
        character.position.z += speed;
        character.rotation.y = Math.PI;
        moving = true;
    }

    if(keys["a"]){
        character.position.x -= speed;
        character.rotation.y = Math.PI / 2;
        moving = true;
    }

    if(keys["d"]){
        character.position.x += speed;
        character.rotation.y = -Math.PI / 2;
        moving = true;
    }

    /* WALK ANIMATION */

    if(moving){

        leftArm.rotation.x = Math.sin(Date.now() * 0.01) * 0.7;
        rightArm.rotation.x = -Math.sin(Date.now() * 0.01) * 0.7;

        leftLeg.rotation.x = -Math.sin(Date.now() * 0.01) * 0.7;
        rightLeg.rotation.x = Math.sin(Date.now() * 0.01) * 0.7;

    }else{

        leftArm.rotation.x = 0;
        rightArm.rotation.x = 0;

        leftLeg.rotation.x = 0;
        rightLeg.rotation.x = 0;

    }

    updateCamera();

    renderer.render(scene,camera);

}

animate();

/* RESIZE */

window.addEventListener("resize", ()=>{

    camera.aspect = window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

</script>

</body>
</html>
```
