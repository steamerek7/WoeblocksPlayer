<!-- INDEX.HTML -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woeblocks</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#121417;
    color:white;
}

/* TOPBAR */

.topbar{
    width:100%;
    height:60px;
    background:#1b1d22;
    border-bottom:1px solid #2c2f36;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.right{
    display:flex;
    align-items:center;
    gap:15px;
}

.username{
    color:#aaa;
    font-size:14px;
}

/* SETTINGS */

.settingsBtn{
    width:40px;
    height:40px;
    border-radius:10px;
    background:#2a2d34;
    border:none;
    cursor:pointer;
    transition:0.2s;

    display:flex;
    align-items:center;
    justify-content:center;
}

.settingsBtn:hover{
    background:#3a3e47;
}

.settingsBtn img{
    width:22px;
}

/* MENU */

.menu{
    position:absolute;
    top:70px;
    right:20px;

    width:220px;

    background:#1d2026;
    border:1px solid #32353d;
    border-radius:12px;

    overflow:hidden;

    display:none;
}

.menu button{
    width:100%;
    background:none;
    border:none;
    color:white;
    padding:15px;
    text-align:left;
    cursor:pointer;
    transition:0.15s;
    font-size:15px;
}

.menu button:hover{
    background:#2a2d35;
}

.logout{
    color:#ff6b6b !important;
}

/* MAIN */

.main{
    padding:30px;
}

/* GAME GRID */

.games{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
}

/* GAME CARD */

.game{
    background:#1b1d22;
    border:1px solid #2b2f36;
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    transition:0.2s;
}

.game:hover{
    transform:translateY(-3px);
    border-color:#444b57;
}

.game img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.gameInfo{
    padding:15px;
}

.gameTitle{
    font-size:20px;
    font-weight:bold;
    margin-bottom:8px;
}

.gameCreator{
    color:#9ca3af;
    margin-bottom:10px;
    font-size:14px;
}

.gameDesc{
    color:#c2c2c2;
    font-size:14px;
    line-height:1.5;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="logo">
        Woeblocks
    </div>

    <div class="right">

        <div class="username" id="userBox"></div>

        <button class="settingsBtn" onclick="toggleMenu()">

            <!-- COG SVG -->

            <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">

        </button>

    </div>

</div>

<!-- MENU -->

<div class="menu" id="menu">

    <button onclick="settings()">
        Settings
    </button>

    <button onclick="safety()">
        Help & Safety
    </button>

    <button class="logout" onclick="logout()">
        Log out
    </button>

</div>

<!-- MAIN -->

<div class="main">

    <div class="games" id="games"></div>

</div>

<script>

/* LOGIN */

const user = localStorage.getItem("currentUser");

if(!user){

    window.location.href = "../login/index.html";

}else{

    document.getElementById("userBox").innerText = user;

}

/* SETTINGS MENU */

const menu = document.getElementById("menu");

function toggleMenu(){

    if(menu.style.display === "block"){

        menu.style.display = "none";

    }else{

        menu.style.display = "block";

    }

}

window.addEventListener("click", function(e){

    if(
        !e.target.closest(".menu") &&
        !e.target.closest(".settingsBtn")
    ){

        menu.style.display = "none";

    }

});

/* BUTTONS */

function settings(){

    alert("Settings page soon.");

}

function safety(){

    alert("Help & Safety page soon.");

}

function logout(){

    localStorage.removeItem("currentUser");
    window.location.href = "../login/index.html";

}

/* GAMES */

const games = [

    {
        title: "Lost & Alone",
        creator: "Wojtas",
        description: "Survive in a massive open world filled with storms, wildlife and danger.",
        image: "https://tr.rbxcdn.com/180DAY-7f8e1d3a8f0e6d93e58c7e4b91a77f9f/768/432/Image/Webp/noFilter"
    },

    {
        title: "Sword Simulator",
        creator: "Wojtas",
        description: "Swing your sword, gain power and unlock stronger worlds.",
        image: "https://images.rbxcdn.com/076d146437ffc79cebc36bf2ded91196.png"
    }

];

/* LOAD GAMES */

const gamesContainer = document.getElementById("games");

games.forEach(game => {

    const div = document.createElement("div");

    div.className = "game";

    div.innerHTML = `

        <img src="${game.image}">

        <div class="gameInfo">

            <div class="gameTitle">
                ${game.title}
            </div>

            <div class="gameCreator">
                Made by ${game.creator}
            </div>

            <div class="gameDesc">
                ${game.description}
            </div>

        </div>

    `;

    div.onclick = function(){

        localStorage.setItem("selectedGame", JSON.stringify(game));

        window.location.href = "GamePage.html";

    };

    gamesContainer.appendChild(div);

});

</script>

</body>
</html>
