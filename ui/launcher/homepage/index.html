<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Woeblocks Player</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 420px;
  padding: 28px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
  position: relative;
}

.userbox {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 12px;
  color: #aaa;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#logout {
  background: #ef4444;
  color: white;
}
</style>
</head>

<body>

<div class="container">

  <div class="userbox" id="userBox"></div>

  <h1>Woeblocks Player</h1>

  <button id="logout" onclick="logout()">Logout</button>

</div>

<script>
const user = localStorage.getItem("currentUser");

// 🔑 AUTO PROTECT PAGE
if (!user) {
    window.location.href = "../login/index.html";
} else {
    document.getElementById("userBox").innerText = "User: " + user;
}

// logout
function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "../login/index.html";
}
</script>

</body>
</html>
