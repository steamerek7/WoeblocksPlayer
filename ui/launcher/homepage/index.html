<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woeblocks</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#121417;
    color:white;
}

/* TOPBAR */

.topbar{
    width:100%;
    height:60px;
    background:#1b1d22;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    border-bottom:1px solid #2c2f36;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.rightSide{
    display:flex;
    align-items:center;
    gap:15px;
}

.username{
    color:#bdbdbd;
    font-size:14px;
}

/* COG */

.cog{
    width:42px;
    height:42px;
    border-radius:10px;
    background:#2a2d34;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.2s;
    font-size:20px;
}

.cog:hover{
    background:#3b3f47;
}

/* DROPDOWN */

.menu{
    position:absolute;
    top:70px;
    right:20px;
    width:220px;
    background:#1e2127;
    border:1px solid #333842;
    border-radius:12px;
    overflow:hidden;
    display:none;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.menu button{
    width:100%;
    background:none;
    border:none;
    color:white;
    padding:16px;
    text-align:left;
    cursor:pointer;
    font-size:15px;
    transition:0.15s;
}

.menu button:hover{
    background:#2b2f37;
}

.logoutBtn{
    color:#ff6b6b !important;
}

/* MAIN */

.main{
    padding:30px;
}

/* GAME PAGE */

.gameCard{
    width:100%;
    max-width:900px;
    background:#1b1d22;
    border-radius:16px;
    overflow:hidden;
    border:1px solid #2d3138;
}

.gameBanner{
    width:100%;
    height:300px;
    background:url('https://tr.rbxcdn.com/180DAY-7f8e1d3a8f0e6d93e58c7e4b91a77f9f/768/432/Image/Webp/noFilter') center/cover;
}

.gameInfo{
    padding:25px;
}

.gameTitle{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
}

.gameDesc{
    color:#b0b0b0;
    line-height:1.6;
    margin-bottom:20px;
}

.playBtn{
    background:#00b06f;
    border:none;
    padding:14px 30px;
    color:white;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.playBtn:hover{
    background:#00c77d;
}

/* MOBILE */

@media(max-width:700px){

    .gameBanner{
        height:200px;
    }

    .gameTitle{
        font-size:24px;
    }

}
</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="logo">Woeblocks</div>

    <div class="rightSide">

        <div class="username" id="userBox"></div>

        <div class="cog" onclick="toggleMenu()">
            ⚙️
        </div>

    </div>

</div>

<!-- DROPDOWN MENU -->

<div class="menu" id="menu">

    <button onclick="openSettings()">
        ⚙️ Settings
    </button>

    <button onclick="openSafety()">
        🛡️ Help & Safety
    </button>

    <button class="logoutBtn" onclick="logout()">
        🚪 Log out
    </button>

</div>

<!-- MAIN -->

<div class="main">

    <div class="gameCard">

        <div class="gameBanner"></div>

        <div class="gameInfo">

            <div class="gameTitle">
                Lost & Alone
            </div>

            <div class="gameDesc">
                Survive in a massive open world. 
                Gather resources, build shelter, explore caves,
                fight wildlife, and stay alive through storms,
                hunger, cold, and darkness.
            </div>

            <button class="playBtn">
                ▶ Play
            </button>

        </div>

    </div>

</div>

<script>

/* USER SYSTEM */

const user = localStorage.getItem("currentUser");

if(!user){
    window.location.href = "../login/index.html";
}else{
    document.getElementById("userBox").innerText = user;
}

/* MENU */

const menu = document.getElementById("menu");

function toggleMenu(){

    if(menu.style.display === "block"){
        menu.style.display = "none";
    }else{
        menu.style.display = "block";
    }

}

/* CLOSE MENU IF CLICK OUTSIDE */

window.addEventListener("click", function(e){

    if(
        !e.target.closest(".menu") &&
        !e.target.closest(".cog")
    ){
        menu.style.display = "none";
    }

});

/* BUTTONS */

function openSettings(){
    alert("Settings page coming soon.");
}

function openSafety(){
    alert("Help & Safety page coming soon.");
}

function logout(){

    localStorage.removeItem("currentUser");
    window.location.href = "../login/index.html";

}

</script>

</body>
</html>
