<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Woeblocks Player</title>

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding-top: 40px;
    }

    #status {
      font-size: 14px;
      color: #00ff88;
      margin-bottom: 10px;
    }

    #title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #news {
      margin: 20px auto;
      width: 80%;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 13px;
      min-height: 60px;
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
    }

    #updateBtn {
      background: orange;
      display: none;
    }

    #playBtn {
      background: #00ff88;
      color: black;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- VERSION (TOP) -->
    <div id="status">v0.0.0</div>

    <!-- TITLE FROM GITHUB -->
    <h1 id="title">Loading...</h1>

    <!-- NEWS -->
    <div id="news">Loading news...</div>

    <!-- BUTTONS -->
    <button id="updateBtn" onclick="manualUpdate()">UPDATE</button>
    <button id="playBtn" onclick="play()">PLAY</button>

  </div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
